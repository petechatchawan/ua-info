name: Patch Playground Command Docs

on:
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/patch-playground-command-docs.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/ua-info-playground-spec'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ua-info-playground-spec
      - name: Update root README command semantics
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text()
          old = '`npm run playground:dev` builds the library, installs the generated package tarball into the private Playground application, and starts the Vite development server.'
          new = '`npm run playground:dev` installs the locked Playground tooling, builds the library, installs the generated package tarball into the private Playground application, and starts the Vite development server.'
          if old not in text:
              raise SystemExit('Playground command description anchor not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit README
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md
          git commit -m "docs: clarify playground setup command"
          git push origin HEAD:agent/ua-info-playground-spec
