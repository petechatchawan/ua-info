name: One-time supersede migration docs

on:
  push:
    branches:
      - agent/ua-info-identity-restoration
    paths:
      - .github/workflows/one-time-supersede-migration-docs.yml

permissions:
  contents: write

jobs:
  prepend-notice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ua-info-identity-restoration

      - name: Prepend supersession notice without rewriting history
        shell: python
        run: |
          from pathlib import Path

          notice = (
              "> **Status: SUPERSEDED**  \n"
              "> **Reason:** npm rejected the unscoped `user-agent-info` package name as too similar to an existing package.  \n"
              "> **Canonical package identity:** `ua-info`\n\n"
          )

          paths = [
              Path("docs/superpowers/specs/2026-07-22-user-agent-info-package-migration-design.md"),
              Path("docs/superpowers/plans/2026-07-22-user-agent-info-package-migration.md"),
          ]

          for path in paths:
              content = path.read_text(encoding="utf-8")
              if "**Status: SUPERSEDED**" in content:
                  continue
              lines = content.splitlines(keepends=True)
              if not lines:
                  raise RuntimeError(f"Cannot supersede empty document: {path}")
              path.write_text(lines[0] + "\n" + notice + "".join(lines[1:]), encoding="utf-8")

      - name: Commit supersession notices
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/superpowers/specs/2026-07-22-user-agent-info-package-migration-design.md
          git add docs/superpowers/plans/2026-07-22-user-agent-info-package-migration.md
          git commit -m "docs: supersede failed package migration"
          git push origin HEAD:agent/ua-info-identity-restoration
