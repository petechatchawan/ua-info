name: Materialize Playground Implementation

on:
  pull_request:
    branches: [master]
    paths:
      - playground-implementation.part00
      - playground-implementation.part01
      - playground-implementation.part02
      - playground-implementation.part03
      - playground-implementation.part04
      - .github/workflows/materialize-playground.yml

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/ua-info-playground-spec'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ua-info-playground-spec
      - name: Validate and extract implementation
        run: |
          cat playground-implementation.part00 \
              playground-implementation.part01 \
              playground-implementation.part02 \
              playground-implementation.part03 \
              playground-implementation.part04 \
            > /tmp/playground-implementation.tar.gz.b64
          test "$(wc -c < /tmp/playground-implementation.tar.gz.b64)" -eq 39268
          base64 --decode /tmp/playground-implementation.tar.gz.b64 > /tmp/playground-implementation.tar.gz
          gzip --test /tmp/playground-implementation.tar.gz
          tar -xzf /tmp/playground-implementation.tar.gz
          rm -f playground-implementation.tar.gz.b64 playground-implementation.part0*
          rm .github/workflows/materialize-playground.yml
      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: implement ua-info playground"
          git push origin HEAD:agent/ua-info-playground-spec
