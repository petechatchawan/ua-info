name: Verify live npm package

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/verify-live-package.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Install clean package
        shell: bash
        run: |
          set -euo pipefail
          workspace="$RUNNER_TEMP/ua-info-live-${{ matrix.node-version }}"
          rm -rf "$workspace"
          mkdir -p "$workspace"
          echo "WORKSPACE=$workspace" >> "$GITHUB_ENV"
          cd "$workspace"
          npm init -y >/dev/null
          npm pkg set type=module
          npm install --ignore-scripts --no-audit --no-fund ua-info@2.0.3 typescript@4.9.5 @types/node@18

      - name: Verify ESM consumer
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE"
          cat > verify.mjs <<'EOF'
          import assert from 'node:assert/strict';
          import { createRequire } from 'node:module';
          import * as root from 'ua-info';
          import { parseRequest } from 'ua-info/server';
          import { detectCurrent } from 'ua-info/browser';

          const userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.6099.109 Safari/537.36';
          assert.equal(root.parse(userAgent).browser?.id, root.BrowserId.Chrome);
          assert.equal(parseRequest({ headers: { 'user-agent': userAgent } }).browser?.id, root.BrowserId.Chrome);
          assert.equal(typeof detectCurrent, 'function');
          assert.equal('UAInfo' in root, false);

          const require = createRequire(import.meta.url);
          const manifest = require('ua-info/package.json');
          assert.equal(manifest.name, 'ua-info');
          assert.equal(manifest.version, '2.0.3');
          assert.throws(() => require('ua-info/v2'), /Package subpath|not defined|cannot find/i);
          EOF
          node verify.mjs

      - name: Verify CommonJS consumer
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE"
          cat > verify.cjs <<'EOF'
          const assert = require('node:assert/strict');
          const root = require('ua-info');
          const { parseRequest } = require('ua-info/server');
          const { detectCurrent } = require('ua-info/browser');
          const userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.6099.109 Safari/537.36';
          assert.equal(root.parse(userAgent).browser?.id, root.BrowserId.Chrome);
          assert.equal(parseRequest({ headers: { 'user-agent': userAgent } }).browser?.id, root.BrowserId.Chrome);
          assert.equal(typeof detectCurrent, 'function');
          assert.equal('UAInfo' in root, false);
          assert.throws(() => require('ua-info/v2'), /Package subpath|not defined|cannot find/i);
          EOF
          node verify.cjs

      - name: Prepare TypeScript consumer
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE"
          cat > verify.ts <<'EOF'
          import { BrowserId, parse } from 'ua-info';
          import { parseRequest } from 'ua-info/server';
          import { detectCurrent } from 'ua-info/browser';

          const result = parse('Mozilla/5.0 Chrome/120.0.0.0 Safari/537.36');
          const browserId = result.browser?.id;
          const requestResult = parseRequest({ headers: { 'user-agent': result.ua } });
          const detector: typeof detectCurrent = detectCurrent;
          void BrowserId;
          void browserId;
          void requestResult;
          void detector;
          EOF

          cat > tsconfig.json <<'EOF'
          {
            "compilerOptions": {
              "target": "ES2020",
              "module": "Node16",
              "moduleResolution": "Node16",
              "strict": true,
              "skipLibCheck": false,
              "noEmit": true
            },
            "include": ["verify.ts"]
          }
          EOF

      - name: Verify TypeScript consumer
        id: typescript
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd "$WORKSPACE"
          npx tsc --project tsconfig.json 2>&1 | tee tsc.log

      - name: Upload TypeScript diagnostics
        if: steps.typescript.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics-node-${{ matrix.node-version }}
          path: ${{ env.WORKSPACE }}/tsc.log

      - name: Verify registry metadata
        shell: bash
        run: |
          set -euo pipefail
          test "$(npm view ua-info@2.0.3 name)" = "ua-info"
          test "$(npm view ua-info@2.0.3 version)" = "2.0.3"
          test "$(npm view ua-info@2.0.3 repository.url)" = "git+https://github.com/petechatchawan/ua-info.git"
          test -z "$(npm view ua-info@2.0.3 deprecated 2>/dev/null || true)"

      - name: Fail on TypeScript error
        if: steps.typescript.outcome != 'success'
        run: exit 1

  report:
    needs: verify
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report live verification
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          title="[live-verification] ua-info@2.0.3"
          if [ "${{ needs.verify.result }}" = "success" ]; then
            status="passed"
          else
            status="failed"
          fi

          body=$(cat <<EOF
          Live npm registry verification.

          - Package: ua-info@2.0.3
          - Matrix: Node.js 18, 20, 22
          - Result: **${status}**
          - Coverage: clean install, ESM, CommonJS, TypeScript, root, /server, /browser, package metadata, removed /v2 subpath
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )

          issue_number=$(gh issue list --repo "${{ github.repository }}" --state all --search "${title} in:title" --json number,title --jq ".[] | select(.title == \"${title}\") | .number" | head -n 1)
          if [ -z "$issue_number" ]; then
            issue_url=$(gh issue create --repo "${{ github.repository }}" --title "$title" --body "$body")
            issue_number="${issue_url##*/}"
          else
            gh issue edit "$issue_number" --repo "${{ github.repository }}" --body "$body"
          fi

          if [ "$status" = "passed" ]; then
            gh issue close "$issue_number" --repo "${{ github.repository }}" --reason completed || true
          else
            gh issue reopen "$issue_number" --repo "${{ github.repository }}" || true
            exit 1
          fi
