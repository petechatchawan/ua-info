name: Apply v2.1 README patch

on:
  push:
    branches:
      - agent/ua-info-v2-1-detection-accuracy-coverage
    paths:
      - .github/workflows/patch-readme-v2-1.yml

permissions:
  contents: write

jobs:
  patch-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ua-info-v2-1-detection-accuracy-coverage
      - name: Patch exact README sections
        shell: python
        run: |
          from pathlib import Path

          path = Path('README.md')
          content = path.read_text(encoding='utf-8')

          old_clients = '''- AI agents such as GPTBot, ClaudeBot, PerplexityBot, and Google-Extended.
          - Crawlers such as Googlebot, Bingbot, AhrefsBot, SemrushBot, Applebot, and CCBot.'''
          new_clients = '''- AI agents such as GPTBot, ClaudeBot, and PerplexityBot.
          - Crawlers such as OAI-SearchBot, OAI-AdsBot, Googlebot, Googlebot Image, Googlebot Video, Bingbot, AhrefsBot, SemrushBot, Applebot, and CCBot.'''

          if content.count(old_clients) != 1:
              raise SystemExit('Expected recognized-client README block exactly once')
          content = content.replace(old_clients, new_clients)

          marker = '''`client` contains one selected non-browser actor. Ordinary browsers and in-app hosts return `client: null`.

          ## Server usage'''
          replacement = '''`client` contains one selected non-browser actor. Ordinary browsers and in-app hosts return `client: null`.

          `Google-Extended` is a robots control token rather than a distinct HTTP User-Agent crawler claim, so parsing `Google-Extended` returns `client: null`. User-triggered fetchers such as `Perplexity-User` are not forced into an inaccurate autonomous-client kind.

          ### Claim detection is not identity verification

          `ua-info` parses User-Agent and Client Hints claims. These values can be absent, reduced, malformed, or spoofed. A matching client ID does not prove request origin.

          Use provider-documented IP ranges, reverse DNS, signed-agent mechanisms, or another server-side verification process when origin verification is required.

          ## Server usage'''

          if content.count(marker) != 1:
              raise SystemExit('Expected server-usage insertion marker exactly once')
          path.write_text(content.replace(marker, replacement), encoding='utf-8')
      - name: Commit README and remove one-time workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git rm .github/workflows/patch-readme-v2-1.yml
          git commit -m "docs: document v2.1 client claim boundaries"
          git push origin HEAD:agent/ua-info-v2-1-detection-accuracy-coverage
