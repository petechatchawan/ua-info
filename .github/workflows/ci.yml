name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - name: Lint
        run: npm run lint 2>&1 | tee lint.log
      - name: Upload lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-log-node-${{ matrix.node-version }}
          path: lint.log
      - run: npm test
      - run: npm run build
      - run: npm run pack:check
