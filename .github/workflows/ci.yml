name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run pack:check

  playground:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root dependencies
        run: npm install
      - name: Install playground tooling
        run: npm install --prefix apps/playground
      - name: Commit generated playground lockfile
        if: github.event_name == 'pull_request'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f apps/playground/package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: lock playground dependencies"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Build library
        run: npm run build
      - name: Install packed library into playground
        run: npm run playground:install
      - name: Verify boundaries
        run: npm run playground:boundaries
      - name: Type-check playground
        run: npm run playground:typecheck 2>&1 | tee apps/playground/typecheck.log
      - name: Upload type-check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playground-typecheck
          path: apps/playground/typecheck.log
          if-no-files-found: ignore
      - name: Run playground tests
        run: npm run playground:test
      - name: Build playground
        run: npm run playground:build
      - name: Install Chromium
        run: npx --prefix apps/playground playwright install --with-deps chromium
      - name: Run production smoke
        run: npm run test:e2e --prefix apps/playground
      - name: Upload Playwright diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playground-playwright
          path: |
            apps/playground/playwright-report
            apps/playground/test-results
          if-no-files-found: ignore
