name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Verify target npm name is available
        if: matrix.node-version == 22
        run: node scripts/verify-target-name-available.mjs
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run pack:check
