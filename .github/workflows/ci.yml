name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run lint
      - name: Run tests
        id: tests
        continue-on-error: true
        run: npm test -- --runInBand --json --outputFile=jest-report.json
      - name: Upload Jest report
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: jest-report-${{ matrix.node-version }}
          path: jest-report.json
      - name: Fail on test errors
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - run: npm run build
      - run: npm run pack:check
