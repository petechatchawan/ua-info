name: Publish to npm

on:
  push:
    branches: [master]
    paths:
      - package.json
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install current npm CLI
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm install

      - name: Validate package
        run: npm run check

      - name: Read package identity
        id: package
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check registry version
        id: registry
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists; publication will be skipped."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        id: publish
        if: steps.registry.outputs.exists != 'true'
        continue-on-error: true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$HOME/.npmrc"
          fi

          npm publish --access public --provenance

      - name: Verify npm registry
        id: verify
        if: always()
        shell: bash
        run: |
          published=false
          for attempt in $(seq 1 12); do
            if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
              published=true
              break
            fi
            sleep 5
          done
          echo "published=${published}" >> "$GITHUB_OUTPUT"

      - name: Report publication status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          title="[release-report] ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          if [ "${{ steps.verify.outputs.published }}" = "true" ]; then
            status="published"
          else
            status="not-published"
          fi

          body=$(cat <<EOF
          Automated npm release verification.

          - Package: ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}
          - Registry status: **${status}**
          - Version existed before this run: ${{ steps.registry.outputs.exists }}
          - Publish step outcome: ${{ steps.publish.outcome }}
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          When status is not-published, configure either npm Trusted Publishing for workflow publish.yml or a valid repository secret named NPM_TOKEN, then run the workflow again.
          EOF
          )

          issue_number=$(gh issue list --state all --search "${title} in:title" --json number,title --jq ".[] | select(.title == \"${title}\") | .number" | head -n 1)
          if [ -z "$issue_number" ]; then
            issue_url=$(gh issue create --title "$title" --body "$body")
            issue_number="${issue_url##*/}"
          else
            gh issue edit "$issue_number" --body "$body"
          fi

          if [ "$status" = "published" ]; then
            gh issue close "$issue_number" --reason completed || true
          else
            gh issue reopen "$issue_number" || true
          fi

      - name: Publication summary
        if: always()
        shell: bash
        run: |
          echo "### npm publication" >> "$GITHUB_STEP_SUMMARY"
          echo "Package: ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Published: ${{ steps.verify.outputs.published }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when package is not published
        if: always() && steps.verify.outputs.published != 'true'
        run: exit 1
