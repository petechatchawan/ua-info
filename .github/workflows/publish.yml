# Canonical release workflow for ua-info releases.
name: Publish to npm

on:
  push:
    branches: [master]
    paths:
      - package.json
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  release-context:
    runs-on: ubuntu-latest
    outputs:
      can-publish: ${{ steps.context.outputs.can-publish }}
    steps:
      - uses: actions/checkout@v6

      - name: Check canonical release identity
        id: context
        shell: bash
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          expected_repository="petechatchawan/ua-info"

          if [ "$package_name" != "ua-info" ]; then
            echo "Unexpected package name: $package_name" >&2
            exit 1
          fi

          if [ "${GITHUB_REPOSITORY}" = "$expected_repository" ]; then
            echo "can-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "can-publish=false" >> "$GITHUB_OUTPUT"
            {
              echo "### npm publication paused"
              echo "Package: ${package_name}@${package_version}"
              echo "Current repository: ${GITHUB_REPOSITORY}"
              echo "Expected repository: ${expected_repository}"
              echo "Rename the repository to the canonical identity before publication."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  publish:
    needs: release-context
    if: needs.release-context.outputs.can-publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install current npm 11 CLI
        run: npm install --global npm@11.17.0

      - name: Install dependencies
        run: npm install

      - name: Read package identity
        id: package
        shell: bash
        run: |
          node -e "const p = require('./package.json'); console.log('name=' + p.name)" >> "$GITHUB_OUTPUT"
          node -e "const p = require('./package.json'); console.log('version=' + p.version)" >> "$GITHUB_OUTPUT"

      - name: Validate package
        id: validation
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee validation.log

      - name: Upload validation log
        if: always() && steps.validation.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: npm-release-validation-log
          path: validation.log

      - name: Check registry version
        id: registry
        if: always()
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists; publication will be skipped."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        id: publish
        if: steps.validation.outcome == 'success' && steps.registry.outputs.exists != 'true'
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -o pipefail
          npm publish --access public --provenance 2>&1 | tee publish.log

      - name: Upload publish log
        if: always() && steps.publish.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-release-publish-log
          path: publish.log

      - name: Verify npm registry
        id: verify
        if: always()
        shell: bash
        run: |
          published=false
          for attempt in $(seq 1 12); do
            if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
              published=true
              break
            fi
            sleep 5
          done
          echo "published=${published}" >> "$GITHUB_OUTPUT"

      - name: Report publication status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          title="[release-report] ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          if [ "${{ steps.verify.outputs.published }}" = "true" ]; then
            status="published"
          else
            status="not-published"
          fi

          body=$(cat <<EOF
          Automated npm release verification.

          - Package: ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}
          - npm CLI: 11.17.0
          - Validation outcome: ${{ steps.validation.outcome }}
          - Registry status: **${status}**
          - Version existed before this run: ${{ steps.registry.outputs.exists }}
          - Publish step outcome: ${{ steps.publish.outcome }}
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          When validation passes but status is not-published, verify npm Trusted Publishing for workflow publish.yml or the temporary NPM_TOKEN fallback, then run the workflow again.
          EOF
          )

          issue_number=$(gh issue list --state all --search "${title} in:title" --json number,title --jq ".[] | select(.title == \"${title}\") | .number" | head -n 1)
          if [ -z "$issue_number" ]; then
            issue_url=$(gh issue create --title "$title" --body "$body")
            issue_number="${issue_url##*/}"
          else
            gh issue edit "$issue_number" --body "$body"
          fi

          if [ "$status" = "published" ]; then
            gh issue close "$issue_number" --reason completed || true
          else
            gh issue reopen "$issue_number" || true
          fi

      - name: Publication summary
        if: always()
        shell: bash
        run: |
          echo "### npm publication" >> "$GITHUB_STEP_SUMMARY"
          echo "Package: ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Validation: ${{ steps.validation.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Published: ${{ steps.verify.outputs.published }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when release is incomplete
        if: always() && (steps.validation.outcome != 'success' || steps.verify.outputs.published != 'true')
        run: exit 1
