name: Deploy Playground

on:
  push:
    branches: [master]
    paths:
      - 'apps/playground/**'
      - 'src/**'
      - 'package.json'
      - 'tsconfig.build*.json'
      - 'scripts/finalize-build.mjs'
      - 'scripts/install-playground-package.mjs'
      - 'scripts/verify-playground-boundaries.mjs'
      - '.github/workflows/deploy-playground.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-playground
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/playground/package-lock.json
      - run: npm install
      - run: npm ci --prefix apps/playground
      - run: npm run build
      - run: npm run playground:install
      - run: npm run playground:boundaries
      - run: npm run playground:typecheck
      - run: npm run playground:test
      - run: npm run playground:build
      - run: npx --prefix apps/playground playwright install --with-deps chromium
      - run: npm run test:e2e --prefix apps/playground
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/playground/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
