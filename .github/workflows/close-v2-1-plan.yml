name: Close ua-info 2.1 release plan

on:
  push:
    branches:
      - docs/close-ua-info-v2-1-release
    paths:
      - .github/workflows/close-v2-1-plan.yml

permissions:
  contents: write

jobs:
  close-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/close-ua-info-v2-1-release

      - name: Mark specification and plan complete
        shell: python
        run: |
          from pathlib import Path

          spec_path = Path('docs/superpowers/specs/2026-07-24-ua-info-v2-1-detection-accuracy-coverage-design.md')
          plan_path = Path('docs/superpowers/plans/2026-07-24-ua-info-v2-1-detection-accuracy-coverage.md')

          spec = spec_path.read_text(encoding='utf-8')
          old_status = '**Status:** Approved for implementation planning  '
          new_status = '**Status:** Implemented and verified  '
          if spec.count(old_status) != 1:
              raise SystemExit('Expected exactly one specification status marker')
          spec = spec.replace(old_status, new_status, 1)

          spec_record = '''

          ## 17. Implementation and Release Record

          The design was implemented and released on 2026-07-24.

          - Implementation PR: `#32`
          - Implementation head: `0e5b227dad3ef64d907610b9a4cb44a8c5133aae`
          - Package release commit: `943801452605be799c88f6ce520aeee19ab90c18`
          - Package: `ua-info@2.1.0`
          - npm publication: GitHub Actions OIDC Trusted Publishing with provenance
          - Publication workflow: `30084060242`
          - Final implementation CI: `30083785184`
          - Live registry and consumer verification: `30084326449`
          - Live verification issue: `#35` — passed and closed
          - GitHub release/tag: `v2.1.0`, targeting the exact package release commit
          - Verified runtimes: Node.js 18, 20, and 22
          - Final detector coverage: lines `97.91%`, functions `100%`, branches `86.99%`; all configured thresholds passed
          - Public result model, package entry points, and runtime dependency set remained unchanged
          '''
          spec_record = '\n'.join(line[10:] if line.startswith('          ') else line for line in spec_record.splitlines())
          if '## 17. Implementation and Release Record' not in spec:
              spec = spec.rstrip() + spec_record + '\n'
          spec_path.write_text(spec, encoding='utf-8')

          plan = plan_path.read_text(encoding='utf-8')
          title = '# ua-info v2.1 Detection Accuracy & Coverage Implementation Plan\n'
          status_block = '''# ua-info v2.1 Detection Accuracy & Coverage Implementation Plan

          **Status:** Implemented and verified  
          **Release:** `ua-info@2.1.0`  
          **Package release commit:** `943801452605be799c88f6ce520aeee19ab90c18`  
          **Live verification:** issue `#35`, workflow `30084326449`
          '''
          status_block = '\n'.join(line[10:] if line.startswith('          ') else line for line in status_block.splitlines())
          if plan.count(title) != 1:
              raise SystemExit('Expected exactly one implementation-plan title')
          if '**Status:** Implemented and verified' not in plan:
              plan = plan.replace(title, status_block + '\n', 1)

          plan = plan.replace('- [ ]', '- [x]')

          completion_record = '''

          ## Completion Record

          All plan tasks and release gates completed on 2026-07-24.

          - Approved design and implementation plan: PR `#31`, merge commit `64bb76cf0b604ed16bfed67ef91d74d145a93df0`
          - Implementation and release PR: `#32`, squash merge commit `943801452605be799c88f6ce520aeee19ab90c18`
          - One-time post-publication verifier PR: `#33`, merge commit `bd631e2ee164332757549479bca72e577eaa623d`
          - TDD evidence recorded in PR `#32`, including fixture, browser, client, platform, coverage, Playground, and release-guard RED/GREEN checkpoints
          - Final implementation CI run `30083785184`: Node.js 18/20/22, detector coverage, builds, packed consumers, and Playground production smoke passed
          - npm publication run `30084060242`: OIDC publish step passed
          - Live verification run `30084326449`: clean registry installs and consumers passed on Node.js 18/20/22
          - Live verification issue `#35`: closed as completed
          - Release report issue `#34`: corrected for registry propagation latency and closed as completed
          - GitHub release/tag `v2.1.0`: verified against package release commit `943801452605be799c88f6ce520aeee19ab90c18`
          - Temporary post-release workflow removed after successful verification
          '''
          completion_record = '\n'.join(line[10:] if line.startswith('          ') else line for line in completion_record.splitlines())
          if '## Completion Record' not in plan:
              plan = plan.rstrip() + completion_record + '\n'
          plan_path.write_text(plan, encoding='utf-8')

      - name: Remove temporary workflows and commit closure
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/verify-release-v2.1.0.yml
          git rm .github/workflows/close-v2-1-plan.yml
          git add docs/superpowers/specs/2026-07-24-ua-info-v2-1-detection-accuracy-coverage-design.md
          git add docs/superpowers/plans/2026-07-24-ua-info-v2-1-detection-accuracy-coverage.md
          git commit -m "docs: close ua-info 2.1 release"
          git push origin HEAD:docs/close-ua-info-v2-1-release
